<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Geodesic sphere (decorative, right side) -->
  <g transform="translate(920, 315)" opacity="0.22">
    <ellipse cx="0" cy="0" rx="200" ry="200" fill="none" stroke="#F59E0B" stroke-width="0.9"/>
    <ellipse cx="0" cy="0" rx="200" ry="76" fill="none" stroke="#F59E0B" stroke-width="0.6"/>
    <ellipse cx="0" cy="0" rx="200" ry="76" fill="none" stroke="#F59E0B" stroke-width="0.6" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="200" ry="76" fill="none" stroke="#F59E0B" stroke-width="0.6" transform="rotate(120)"/>
    <ellipse cx="0" cy="0" rx="76" ry="200" fill="none" stroke="#F59E0B" stroke-width="0.6"/>
    <ellipse cx="0" cy="0" rx="140" ry="140" fill="none" stroke="#F59E0B" stroke-width="0.5"/>
    <ellipse cx="0" cy="0" rx="140" ry="54" fill="none" stroke="#F59E0B" stroke-width="0.4" transform="rotate(30)"/>
    <ellipse cx="0" cy="0" rx="140" ry="54" fill="none" stroke="#F59E0B" stroke-width="0.4" transform="rotate(90)"/>
    <ellipse cx="0" cy="0" rx="140" ry="54" fill="none" stroke="#F59E0B" stroke-width="0.4" transform="rotate(150)"/>
  </g>

  <!-- Logo mark -->
  <rect x="80" y="88" width="64" height="64" rx="14" fill="#F59E0B"/>
  <text x="112" y="143" font-family="Georgia, serif" font-size="46" font-weight="700" fill="#0A0A0A" text-anchor="middle">B</text>

  <!-- Brand name -->
  <text x="162" y="131" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5">Bear</text>
  <text x="218" y="131" font-family="'Inter', Arial, sans-serif" font-size="22" fill="#6B7280" letter-spacing="2">ON STELLAR</text>

  <!-- Divider -->
  <rect x="80" y="188" width="560" height="1" fill="#F59E0B" opacity="0.3"/>

  <!-- Headline -->
  <text x="80" y="272" font-family="'Inter', Arial, sans-serif" font-size="52" font-weight="800" fill="#FFFFFF" letter-spacing="-1">The Commerce Layer</text>
  <text x="80" y="338" font-family="'Inter', Arial, sans-serif" font-size="52" font-weight="800" fill="#F59E0B" letter-spacing="-1">for Agent Payments</text>

  <!-- Subtext -->
  <text x="80" y="402" font-family="'Inter', Arial, sans-serif" font-size="24" fill="#9CA3AF">Job escrow · On-chain agent identity · x402 + MPP</text>

  <!-- Bottom pills -->
  <rect x="80" y="460" width="120" height="36" rx="18" fill="#1A1A1A" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="140" y="483" font-family="'Inter', Arial, sans-serif" font-size="15" fill="#F59E0B" text-anchor="middle">Soroban</text>

  <rect x="214" y="460" width="100" height="36" rx="18" fill="#1A1A1A" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="264" y="483" font-family="'Inter', Arial, sans-serif" font-size="15" fill="#F59E0B" text-anchor="middle">Stellar</text>

  <rect x="328" y="460" width="84" height="36" rx="18" fill="#1A1A1A" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="370" y="483" font-family="'Inter', Arial, sans-serif" font-size="15" fill="#F59E0B" text-anchor="middle">x402</text>

  <rect x="426" y="460" width="84" height="36" rx="18" fill="#1A1A1A" stroke="#F59E0B" stroke-width="1" stroke-opacity="0.4"/>
  <text x="468" y="483" font-family="'Inter', Arial, sans-serif" font-size="15" fill="#F59E0B" text-anchor="middle">MPP</text>

  <!-- Bottom domain -->
  <text x="80" y="572" font-family="'Inter', Arial, sans-serif" font-size="18" fill="#374151">marc-stellar.vercel.app</text>
</svg>
